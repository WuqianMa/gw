run_name: phase1_mlp
task_id: "1.0"
phase: 1
seed: 42
notes: "Stage 1 MLP baseline, Dataset A (4 keypoints, 8 coords), no augmentation."

data:
  train_csv: data/dataset_a/dataset_a_train.csv
  val_csv:   data/dataset_a/dataset_a_val.csv
  test_csv:  data/dataset_a/dataset_a_test.csv
  coord_set: A
  three_channel: false
  num_workers: 2
  augmentation: {}

model:
  type: mlp
  output_dim: 8
  dropout: 0.0
  freeze_backbone: false
  unfreeze_last_n_blocks: 0

train:
  stage: single
  epochs: 100
  batch_size: 64
  optimizer: adam
  lr: 1.0e-3
  weight_decay: 0.0
  grad_clip: 1.0
  scheduler: {type: reduce_on_plateau, factor: 0.5, patience: 5, min_lr: 1.0e-6}
  early_stopping: {patience: 15, monitor: val_rmse_px}
